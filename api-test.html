<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Log Test</title>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  padding: 20px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}

textarea {
  width: 100%;
  height: 100px;
  margin-top: 10px;
}

pre {
  background: #222;
  padding: 10px;
  overflow: auto;
}
</style>
</head>
<body>

<h1>D-Log Supabase Test</h1>

<button onclick="loadPosts()">게시글 불러오기</button>

<h2>글 작성</h2>

<textarea id="content"></textarea>
<br>
<button onclick="createPost()">작성</button>

<h2>결과</h2>
<pre id="result"></pre>


<script>
const API =
  "https://d-log-api.alexeom97.workers.dev/api/posts";

async function loadPosts() {
  const res = await fetch(API);

  const data = await res.json();

  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
}

async function createPost() {

  const content =
    document.getElementById("content").value;

  const res = await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    },
    body: JSON.stringify({
      content
    })
  });

  const data = await res.json();

  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
