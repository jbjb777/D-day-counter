<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>로그 : D-Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="./logo.png">
  <style>
    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 0 100px;
    }

    .nav {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-back {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-back img {
      width: 24px;
      height: 24px;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 700;
    }

    .hero {
      margin: 0 20px 24px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
    }

    .hero-category {
      font-size: 13px;
      font-weight: 700;
      color: var(--cat);
      margin-bottom: 12px;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 24px;
      line-height: 1.3;
    }

    .hero-dday-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 12px;
    }

    .hero-prefix {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .hero-num {
      font-size: 72px;
      font-weight: 800;
      color: var(--cat);
      letter-spacing: -3px;
    }

    .hero-hms {
      display: flex;
      gap: 16px;
      font-size: 16px;
    }

    .hero-hms-item {
      text-align: left;
    }

    .hero-hms-num {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .hero-hms-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-top: 2px;
    }

    .btn-max {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: none;
      background: var(--surface2);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-max:hover {
      background: var(--border-dark);
    }

    .btn-max img {
      width: 20px;
      height: 20px;
      opacity: 0.6;
    }

    .info-section {
      margin: 0 20px 32px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid var(--surface2);
      align-items: center;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-key {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .info-val {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-val img {
      width: 16px;
      height: 16px;
    }

    .action-section {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-full {
      width: 100%;
      height: 56px;
      border-radius: var(--radius);
    }

    .popup-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 32px;
    }

    body.fs-active .app {
      max-width: 100%;
      padding: 0;
      margin: 0;
    }

    /* Slot Machine Animation */
    .slot-container {
      display: flex;
      gap: 0;
    }

    .slot-digit {
      overflow: hidden;
      height: 1em;
      line-height: 1;
    }

    .slot-inner {
      animation: slot-spin 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .slot-num {
      line-height: 1;
      height: 1em;
      display: block;
    }

    @keyframes slot-spin {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-1em);
      }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <div class="app">
      <div class="nav">
        <button class="nav-back" onclick="history.back()">
          <img src="back.svg" alt="Back">
        </button>
        <div class="nav-title" id="navTitle">로그</div>
      </div>

      <div class="hero" id="hero">
        <button class="btn-max" onclick="toggleFS()" id="fsBtn" style="display:none;">
          <img src="max.svg">
        </button>
        <div class="hero-category" id="heroCategory"></div>
        <div class="hero-title" id="heroTitle">로딩 중...</div>
        <div class="hero-dday-row">
          <span class="hero-prefix">D</span>
          <span class="hero-num" id="heroDday"></span>
        </div>
        <div class="hero-hms">
          <div class="hero-hms-item">
            <div class="hero-hms-num" id="heroHour">00</div>
            <div class="hero-hms-label">시</div>
          </div>
          <div class="hero-hms-item">
            <div class="hero-hms-num" id="heroMin">00</div>
            <div class="hero-hms-label">분</div>
          </div>
          <div class="hero-hms-item">
            <div class="hero-hms-num" id="heroSec">00</div>
            <div class="hero-hms-label">초</div>
          </div>
        </div>
      </div>

      <div class="info-section">
        <div class="info-row">
          <span class="info-key">목표일</span>
          <span class="info-val" id="targetDate">-</span>
        </div>
        <div class="info-row">
          <span class="info-key">남은 시간</span>
          <span class="info-val" id="remainTime">-</span>
        </div>
      </div>

      <div class="action-section">
        <button class="btn btn-primary btn-full" onclick="deleteItem()">삭제하기</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation -->
  <div class="popup-overlay" id="delOverlay" onclick="closeDelPopup()"></div>
  <div class="popup-sheet" id="delSheet" style="text-align: center; padding-top: 40px;">
    <div style="margin-bottom: 20px;"><img src="del.svg" alt="Delete" style="width: 48px; height: 48px;"></div>
    <div class="popup-title" style="margin-bottom: 8px;">정말 삭제할까요?</div>
    <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 14px;">삭제된 로그는 복구할 수 없습니다.</p>
    <div class="popup-actions">
      <button class="btn btn-ghost" onclick="closeDelPopup()">취소</button>
      <button class="btn btn-primary" style="background:var(--danger)" onclick="confirmDelete()">삭제</button>
    </div>
  </div>

  <script>
    const COLORS = [
      { cls: 'cat-blue', hex: '#3182F6' },
      { cls: 'cat-purple', hex: '#8B5CF6' },
      { cls: 'cat-pink', hex: '#F43F5E' },
      { cls: 'cat-orange', hex: '#FF9500' },
      { cls: 'cat-green', hex: '#00BA54' },
      { cls: 'cat-red', hex: '#F04452' },
      { cls: 'cat-teal', hex: '#00C7BE' },
    ];

    let currentItem = null;
    let currentIndex = -1;
    let colorMap = {};
    COLORS.forEach(c => colorMap[c.cls] = c.hex);

    const prevDigits = {};
    function slotRender(el, value, key) {
      const str = String(value).padStart(2, '0');
      const prev = prevDigits[key] || str;
      prevDigits[key] = str;
      let html = '<div class="slot-container">';
      for (let i = 0; i < str.length; i++) {
        const d = str[i];
        const p = prev[i];
        if (d === p) {
          html += `<div class="slot-digit"><div class="slot-num">${d}</div></div>`;
        } else {
          html += `<div class="slot-digit"><div class="slot-inner"><div class="slot-num">${p}</div><div class="slot-num">${d}</div></div></div>`;
        }
      }
      html += '</div>';
      el.innerHTML = html;
    }

    function calcDiff(dateStr) {
      const diff = new Date(dateStr) - new Date();
      if (diff <= 0) return null;
      const s = Math.floor(diff / 1000);
      return { d: Math.floor(s / 86400), h: Math.floor((s % 86400) / 3600), m: Math.floor((s % 3600) / 60), s: s % 60 };
    }

    function loadFromLocalStorage() {
      const params = new URLSearchParams(window.location.search);
      const title = params.get('u');
      
      if (!title) {
        document.getElementById('heroTitle').textContent = '항목을 찾을 수 없습니다';
        return;
      }

      const data = JSON.parse(localStorage.getItem('dday') || '[]');
      const item = data.find(i => i.title === title);

      if (!item) {
        document.getElementById('heroTitle').textContent = '항목을 찾을 수 없습니다';
        return;
      }

      currentItem = item;
      currentIndex = data.indexOf(item);
      renderDetail();
    }

    function renderDetail() {
      if (!currentItem) return;

      const diff = calcDiff(currentItem.date);
      if (!diff) {
        document.getElementById('heroTitle').textContent = '완료됨';
        return;
      }

      document.getElementById('heroTitle').textContent = currentItem.title;
      document.getElementById('heroCategory').textContent = '';
      document.getElementById('heroCategory').style.background = colorMap[currentItem.color];
      document.getElementById('heroCategory').style.width = '8px';
      document.getElementById('heroCategory').style.height = '8px';
      document.getElementById('heroCategory').style.borderRadius = '50%';
      document.getElementById('heroCategory').style.margin = '0';

      slotRender(document.getElementById('heroDday'), diff.d, 'heroDday');
      slotRender(document.getElementById('heroHour'), diff.h, 'heroHour');
      slotRender(document.getElementById('heroMin'), diff.m, 'heroMin');
      slotRender(document.getElementById('heroSec'), diff.s, 'heroSec');

      const targetDate = new Date(currentItem.date);
      document.getElementById('targetDate').textContent = targetDate.toLocaleDateString('ko-KR');
      document.getElementById('remainTime').textContent = `${diff.d}일 ${diff.h}시간 ${diff.m}분`;
    }

    function toggleFS() {
      document.body.classList.toggle('fs-active');
    }

    function deleteItem() {
      document.getElementById('delOverlay').classList.add('open');
      document.getElementById('delSheet').classList.add('open');
    }

    function closeDelPopup() {
      document.getElementById('delOverlay').classList.remove('open');
      document.getElementById('delSheet').classList.remove('open');
    }

    function confirmDelete() {
      const data = JSON.parse(localStorage.getItem('dday') || '[]');
      data.splice(currentIndex, 1);
      localStorage.setItem('dday', JSON.stringify(data));
      closeDelPopup();
      history.back();
    }

    function initPage() {
      loadFromLocalStorage();
      setInterval(() => {
        if (currentItem) renderDetail();
      }, 1000);
    }

    initPage();
  </script>
</body>

</html>
